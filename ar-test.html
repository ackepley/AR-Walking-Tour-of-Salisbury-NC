<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AR Marker Test - Salisbury Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame (3D engine). We use 1.3.0 here because it is the version
         that pairs reliably with AR.js 3.4.5 below. -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

    <!-- AR.js: free library that adds camera + marker tracking to A-Frame. -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <!-- arjs turns on the webcam. embedded keeps the scene inside the page. -->
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
    >
      <!-- When the camera sees the "hiro" marker, everything inside shows up. -->
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" rotation="0 45 0" color="#C8102E"></a-box>
        <a-text
          value="It works!"
          position="0 1.2 0"
          align="center"
          color="#222222"
          rotation="-90 0 0"
        ></a-text>
      </a-marker>

      <!-- The camera that represents your phone. -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
