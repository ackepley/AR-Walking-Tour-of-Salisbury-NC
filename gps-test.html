<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GPS AR Test - Salisbury Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame + AR.js, same versions as our working marker page. -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }

      /* Full-screen intro that handles the iPhone "tap to enable" requirement. */
      #startOverlay {
        position: fixed; inset: 0; z-index: 9999;
        background: #111; color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 28px;
      }
      #startBtn {
        margin-top: 26px; padding: 16px 30px; font-size: 18px;
        background: #C8102E; color: #fff; border: none; border-radius: 12px;
      }
      /* Little status line so you can see what's happening. */
      #status {
        position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 9998;
        color: #fff; background: rgba(0,0,0,0.55);
        padding: 10px 14px; border-radius: 10px; font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="startOverlay">
      <h2>Salisbury AR — GPS Test</h2>
      <p>
        Go outside for the best GPS signal.<br /><br />
        Tap Start, then allow <b>Camera</b>, <b>Location</b>, and <b>Motion</b>.<br /><br />
        Four boxes will appear ~15 m around you:<br />
        <b style="color:#ff6b6b">Red = North</b> &nbsp;
        <b style="color:#5aa9ff">Blue = East</b><br />
        <b style="color:#69db7c">Green = South</b> &nbsp;
        <b style="color:#ffe066">Yellow = West</b><br /><br />
        Turn slowly in a full circle to find them.
      </p>
      <button id="startBtn">Start AR</button>
    </div>

    <div id="status">Waiting to start…</div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
    >
      <!-- This camera follows your phone's GPS + compass.
           positionMinAccuracy: 1000 lets AR.js set the origin even when the
           phone's first GPS fix is rough (default 100m is often too strict and
           leaves objects stuck on top of you). -->
      <a-camera gps-camera="positionMinAccuracy: 1000" rotation-reader></a-camera>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (t) => (statusEl.textContent = t);
      let boxesPlaced = false;

      // Place four colored boxes a fixed distance around a lat/lon point.
      function placeBoxes(lat, lon) {
        const scene = document.querySelector("a-scene");
        const meters = 12;
        // How many degrees equal our distance in meters:
        const dLat = meters / 111111;
        const dLon = meters / (111111 * Math.cos((lat * Math.PI) / 180));

        const points = [
          { color: "#C8102E", latitude: lat + dLat, longitude: lon }, // North
          { color: "#1E88E5", latitude: lat, longitude: lon + dLon }, // East
          { color: "#43A047", latitude: lat - dLat, longitude: lon }, // South
          { color: "#FDD835", latitude: lat, longitude: lon - dLon }, // West
        ];

        points.forEach((p) => {
          const box = document.createElement("a-box");
          box.classList.add("gpsbox");
          box.setAttribute("color", p.color);
          box.setAttribute("scale", "3 3 3"); // 3-meter cube, easy to see at 12m
          box.setAttribute(
            "gps-entity-place",
            `latitude: ${p.latitude}; longitude: ${p.longitude}`
          );
          scene.appendChild(box);
        });

        setStatus("Boxes placed! Slowly turn in a full circle: Red=N, Blue=E, Green=S, Yellow=W.");
      }

      document.getElementById("startBtn").addEventListener("click", async () => {
        // iPhone (iOS 13+) requires a tap to ask for motion/compass access.
        try {
          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== "granted") {
              setStatus("Motion access denied — the compass won't work. Reload and allow it.");
            }
          }
        } catch (e) {
          // Non-iOS phones don't need this; ignore.
        }

        document.getElementById("startOverlay").style.display = "none";
        setStatus("Getting your location… (hold still a few seconds)");

        // Read your location directly (this is the method that worked before).
        // Boxes get created here; because the camera uses gpsMinDistance: 0,
        // it keeps updating and positions them in the world while you stand still.
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            if (boxesPlaced) return;
            boxesPlaced = true;
            placeBoxes(pos.coords.latitude, pos.coords.longitude);
          },
          (err) =>
            setStatus("Location error: " + err.message + " (reload and allow Location)"),
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
      });
    </script>
  </body>
</html>
