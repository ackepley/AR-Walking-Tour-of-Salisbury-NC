<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rowan Museum / Old Courthouse - Salisbury AR Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame + AR.js, the versions/config proven to work on your phone. -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <!-- Custom A-Frame components MUST be registered HERE, in <head>, BEFORE
         <a-scene> is parsed. (If defined later they silently never attach.) -->
    <script>
      // Smooths the noisy iOS compass so the AR view doesn't twitch. It replaces
      // AR.js's raw compass handler with a low-pass filtered one. alpha: lower =
      // smoother but slightly more lag (0.1 is a good balance).
      AFRAME.registerComponent("smooth-heading", {
        schema: { alpha: { default: 0.1 } },
        init: function () {
          this.patched = false;
          this.el.sceneEl.addEventListener("loaded", () => this.patch());
          setTimeout(() => this.patch(), 800);
        },
        patch: function () {
          if (this.patched) return;
          const gps = this.el.components["gps-camera"];
          if (!gps || !gps._onDeviceOrientation) return;
          this.patched = true;

          const eventName =
            "ondeviceorientationabsolute" in window
              ? "deviceorientationabsolute"
              : "ondeviceorientation" in window
              ? "deviceorientation"
              : "";
          if (!eventName) return;

          window.removeEventListener(eventName, gps._onDeviceOrientation, false);
          const orig = gps._onDeviceOrientation.bind(gps);
          const alpha = this.data.alpha;
          let smoothed = null;

          window.addEventListener(
            eventName,
            function (event) {
              orig(event);
              if (gps.heading == null) return;
              if (smoothed === null) smoothed = gps.heading;
              let diff = gps.heading - smoothed;
              if (diff > 180) diff -= 360;
              if (diff < -180) diff += 360;
              smoothed = (smoothed + alpha * diff + 360) % 360;
              gps.heading = smoothed;
            },
            false
          );
        },
      });
    </script>

    <!-- YouTube IFrame Player API. This free script lets us control the player
         from JavaScript (mute, autoplay, unmute on tap) instead of making the
         visitor press play. It calls onYouTubeIframeAPIReady() when loaded. -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
      #startOverlay {
        position: fixed; inset: 0; z-index: 9999;
        background: #111; color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 28px;
      }
      #startBtn {
        margin-top: 26px; padding: 16px 30px; font-size: 18px;
        background: #C8102E; color: #fff; border: none; border-radius: 12px;
      }
      #status {
        position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 9998;
        color: #fff; background: rgba(0,0,0,0.55);
        padding: 10px 14px; border-radius: 10px; font-size: 14px;
      }
      /* On-screen diagnostic readout (shown in normal mode after Start). */
      #diag {
        position: fixed; top: 10px; left: 10px; right: 10px; z-index: 9998;
        display: none; color: #9effa0; background: rgba(0,0,0,0.62);
        padding: 8px 10px; border-radius: 8px;
        font-family: monospace; font-size: 12px; line-height: 1.5;
        white-space: pre-wrap;
      }
      /* The video pop-up that appears over the live AR camera view. */
      #videoOverlay {
        position: fixed; inset: 0; z-index: 9998; display: none;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.35); padding: 14px;
      }
      #videoCard {
        width: min(92vw, 640px);
        background: #000; border: 3px solid #FFD45A; border-radius: 14px;
        overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      }
      /* 16:9 responsive frame for the player. */
      #videoFrame { position: relative; width: 100%; padding-top: 56.25%; }
      #videoFrame > div, #videoFrame > iframe {
        position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
      }
      #videoControls {
        display: flex; gap: 8px; padding: 8px;
        background: #13132b;
      }
      #videoControls button {
        flex: 1; font-size: 16px; padding: 12px 10px;
        border: none; border-radius: 8px; color: #fff; background: #C8102E;
      }
      #soundBtn { background: #1a7f37; }
    </style>
  </head>

  <body>
    <div id="startOverlay">
      <h2>Salisbury AR Tour — The Old Courthouse</h2>
      <p id="introText">
        Stand on North Main Street in front of the Old Courthouse (Rowan Museum).<br /><br />
        Tap Start, then allow <b>Camera</b>, <b>Location</b>, and <b>Motion</b>.<br />
        Walk up to the courthouse and the video will start on its own.
      </p>
      <button id="startBtn">Start</button>
    </div>

    <div id="status">Waiting to start…</div>

    <!-- Live diagnostic readout (shows your distance so you can see the trigger) -->
    <div id="diag">diagnostic starting…</div>

    <!-- The YouTube pop-up (hidden until you arrive, or instantly in ?preview) -->
    <div id="videoOverlay">
      <div id="videoCard">
        <div id="videoFrame"><div id="ytPlayer"></div></div>
        <div id="videoControls">
          <button id="soundBtn">🔊 Sound on</button>
          <button id="closeBtn">✕ Close</button>
        </div>
      </div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
    >
      <!-- GPS + compass camera (no videoTexture; relaxed accuracy).
           No 3D sign now — the video pops up as an overlay when you arrive. -->
      <a-camera
        gps-camera="positionMinAccuracy: 1000"
        rotation-reader
        smooth-heading="alpha: 0.1"
      ></a-camera>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (t) => (statusEl.textContent = t);

      // The Old Courthouse location (you calibrated this on-site).
      const MUSEUM = { lat: 35.668582, lon: -80.468758 };

      // Your YouTube video. To swap videos later, change just this ID — it's the
      // part after "watch?v=" in the YouTube URL.
      const VIDEO_ID = "vRhn56OkTUQ";

      // How close (in meters) you must be for the video to auto-open. GPS on a
      // phone is good to ~10-15m, so 30m gives a comfortable trigger zone.
      const TRIGGER_RADIUS = 15;

      const isPreview = new URLSearchParams(location.search).has("preview");

      // ---- YouTube player setup -------------------------------------------
      // We use the IFrame API so the video can autoplay MUTED with no tap.
      // (iOS Safari blocks autoplay WITH sound — that's a browser rule we can't
      // bypass — so it starts muted and the "Sound on" button unmutes it. That
      // button counts as your tap, which is what iOS requires for audio.)
      let player = null;        // the YT player object, once created
      let apiReady = false;     // becomes true when the YouTube script loads
      let videoOpened = false;  // so we only auto-open once

      // YouTube calls this automatically when its API script has loaded.
      function onYouTubeIframeAPIReady() {
        apiReady = true;
      }

      function openVideo() {
        if (videoOpened) return;        // don't reopen if already showing
        if (!apiReady) {                // API not loaded yet — try again shortly
          setTimeout(openVideo, 250);
          return;
        }
        videoOpened = true;
        document.getElementById("videoOverlay").style.display = "flex";

        player = new YT.Player("ytPlayer", {
          videoId: VIDEO_ID,
          playerVars: {
            autoplay: 1,      // start automatically…
            mute: 1,          // …muted, so iOS allows the autoplay
            playsinline: 1,   // play in-page on iPhone (not fullscreen)
            rel: 0,           // don't show unrelated videos at the end
            modestbranding: 1,
          },
          events: {
            onReady: function (e) {
              e.target.mute();
              e.target.playVideo();
            },
          },
        });
        setStatus("Video playing (muted). Tap 'Sound on' for audio.");
      }

      // "Sound on": unmute. Because this runs inside your tap, iOS allows audio.
      document.getElementById("soundBtn").addEventListener("click", () => {
        if (!player) return;
        player.unMute();
        player.setVolume(100);
        setStatus("Sound on. Enjoy!");
      });

      // "Close": stop the video and hide the pop-up.
      document.getElementById("closeBtn").addEventListener("click", () => {
        if (player && player.stopVideo) player.stopVideo();
        document.getElementById("videoOverlay").style.display = "none";
        setStatus("Video closed. Walk up to the courthouse to replay, or reload.");
        videoOpened = false; // allow it to auto-open again if you walk back
      });

      // ---- Distance helpers (for the diagnostic + the proximity trigger) ---
      const toRad = (d) => (d * Math.PI) / 180;
      function haversineM(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
        return 2 * R * Math.asin(Math.sqrt(a));
      }

      // ---- LIVE DIAGNOSTIC + proximity trigger ----------------------------
      function updateDiag() {
        const el = document.getElementById("diag");
        if (!el) return;
        const cam = document.querySelector("[gps-camera]");
        const gps = cam && cam.components && cam.components["gps-camera"];
        const lines = [];

        if (!gps || !gps.currentCoords) {
          lines.push("GPS: waiting for a fix…");
        } else {
          const c = gps.currentCoords;
          const acc = c.accuracy != null ? "±" + Math.round(c.accuracy) + "m" : "?";
          lines.push("GPS fix: " + acc);
          lines.push("you:  " + c.latitude.toFixed(6) + ", " + c.longitude.toFixed(6));
          lines.push("spot: " + MUSEUM.lat.toFixed(6) + ", " + MUSEUM.lon.toFixed(6));
          const d = haversineM(c.latitude, c.longitude, MUSEUM.lat, MUSEUM.lon);
          lines.push("distance: " + d.toFixed(1) + "m  (opens within " + TRIGGER_RADIUS + "m)");

          // The trigger: once you're inside the radius, open the video.
          if (d <= TRIGGER_RADIUS) openVideo();
        }

        el.textContent = lines.join("\n");
      }

      document.getElementById("startBtn").addEventListener("click", async () => {
        // iPhone: tap-to-enable motion/compass.
        try {
          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            await DeviceOrientationEvent.requestPermission();
          }
        } catch (e) {}

        document.getElementById("startOverlay").style.display = "none";

        if (isPreview) {
          // TEST MODE: open the video right away, no GPS needed (try it at home).
          setStatus("Preview — opening the video now.");
          openVideo();
          return;
        }

        // Real mode: show the distance readout and wait until you're close.
        document.getElementById("diag").style.display = "block";
        updateDiag();
        setInterval(updateDiag, 500);
        setStatus("Walk toward the Old Courthouse — the video opens within " + TRIGGER_RADIUS + "m.");
      });
    </script>
  </body>
</html>
