<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bell Tower - Salisbury AR Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame + AR.js, the versions/config proven to work on your phone. -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
      #startOverlay {
        position: fixed; inset: 0; z-index: 9999;
        background: #111; color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 28px;
      }
      #startBtn {
        margin-top: 26px; padding: 16px 30px; font-size: 18px;
        background: #C8102E; color: #fff; border: none; border-radius: 12px;
      }
      #status {
        position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 9998;
        color: #fff; background: rgba(0,0,0,0.55);
        padding: 10px 14px; border-radius: 10px; font-size: 14px;
      }
      #calPanel {
        position: fixed; left: 10px; right: 10px; bottom: 70px; z-index: 9998;
        display: none; background: rgba(0,0,0,0.7); color: #fff;
        padding: 10px; border-radius: 12px;
      }
      #calPanel button {
        font-size: 16px; padding: 12px 10px; border: none; border-radius: 8px;
        background: #C8102E; color: #fff;
      }
      #dropBtn { width: 100%; }
      #calPanel .nudge {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 5px; margin-top: 7px;
      }
      #coordOut {
        margin-top: 8px; font-size: 13px; font-family: monospace;
        white-space: pre-wrap; word-break: break-all; color: #FFD45A;
      }
    </style>
  </head>

  <body>
    <div id="startOverlay">
      <h2>Salisbury AR Tour — The Bell Tower</h2>
      <p id="introText">
        Stand near the Bell Tower at Bell Tower Green.<br /><br />
        Tap Start, then allow <b>Camera</b>, <b>Location</b>, and <b>Motion</b>.<br />
        Raise your phone to see the info sign appear.
      </p>
      <button id="startBtn">Start</button>
    </div>

    <div id="status">Waiting to start…</div>

    <!-- On-site calibration controls (only shown with ?calibrate) -->
    <div id="calPanel">
      <button id="dropBtn">Drop sign 10m ahead of me</button>
      <div class="nudge">
        <button data-dir="N">▲ N</button>
        <button data-dir="S">▼ S</button>
        <button data-dir="W">◀ W</button>
        <button data-dir="E">▶ E</button>
      </div>
      <div id="coordOut">Tap "Drop" while standing where visitors will stand.</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
    >
      <!-- GPS + compass camera (no videoTexture; relaxed accuracy).
           smooth-heading filters the noisy iOS compass to reduce jitter. -->
      <a-camera
        gps-camera="positionMinAccuracy: 1000"
        rotation-reader
        smooth-heading="alpha: 0.1"
      ></a-camera>

      <!-- The Bell Tower info sign, anchored to the tower's real coordinates.
           position y=1.6 lifts it to about eye level; face-camera makes it
           always turn toward you. -->
      <a-entity
        id="bellTowerSign"
        gps-entity-place="latitude: 35.66885; longitude: -80.47207"
        position="0 1.6 0"
        face-camera
      >
        <!-- One flat panel; its image is drawn at runtime (see script). -->
        <a-plane
          id="signPlane"
          width="4"
          height="3"
          material="shader: flat; side: double"
        ></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (t) => (statusEl.textContent = t);

      const TOWER = { lat: 35.66885, lon: -80.47207 };

      // Smooths the noisy iOS compass so the AR view doesn't twitch.
      // It replaces AR.js's raw compass handler with a low-pass filtered one.
      // alpha: lower = smoother but slightly more lag (0.1 is a good balance).
      AFRAME.registerComponent("smooth-heading", {
        schema: { alpha: { default: 0.1 } },
        init: function () {
          this.patched = false;
          this.el.sceneEl.addEventListener("loaded", () => this.patch());
          setTimeout(() => this.patch(), 800);
        },
        patch: function () {
          if (this.patched) return;
          const gps = this.el.components["gps-camera"];
          if (!gps || !gps._onDeviceOrientation) return;
          this.patched = true;

          const eventName =
            "ondeviceorientationabsolute" in window
              ? "deviceorientationabsolute"
              : "ondeviceorientation" in window
              ? "deviceorientation"
              : "";
          if (!eventName) return;

          // Remove AR.js's raw listener and install a smoothed wrapper.
          window.removeEventListener(eventName, gps._onDeviceOrientation, false);
          const orig = gps._onDeviceOrientation.bind(gps);
          const alpha = this.data.alpha;
          let smoothed = null;

          window.addEventListener(
            eventName,
            function (event) {
              orig(event); // let AR.js compute the raw heading
              if (gps.heading == null) return;
              if (smoothed === null) smoothed = gps.heading;
              // shortest-path blend, handling the 360°/0° wrap
              let diff = gps.heading - smoothed;
              if (diff > 180) diff -= 360;
              if (diff < -180) diff += 360;
              smoothed = (smoothed + alpha * diff + 360) % 360;
              gps.heading = smoothed;
            },
            false
          );
        },
      });

      // ---- Draw the sign as one high-res image (no layered 3D text) ----
      const SIGN_TITLE = "THE BELL TOWER";
      const SIGN_BODY =
        "Built in 1892 as the bell tower of the First Presbyterian Church, " +
        "designed by Philadelphia architect Charles W. Bolton in the Romanesque " +
        "Revival style. The church was razed in 1971, but the tower was saved. " +
        "Today it anchors Bell Tower Green, a 3.5-acre downtown park that opened in 2021.";

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      // Split text into lines that fit within maxWidth.
      function wrapLines(ctx, text, maxWidth) {
        const words = text.split(" ");
        const lines = [];
        let line = "";
        for (const w of words) {
          const test = line ? line + " " + w : w;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = w;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      function makeSignCanvas() {
        const W = 1024;
        const margin = 70; // equal space above the title and below the last line
        const sideMargin = 80; // left/right text inset
        const titleFont = "bold 78px -apple-system, Helvetica, Arial, sans-serif";
        const bodyFont = "46px -apple-system, Helvetica, Arial, sans-serif";
        const titleBlock = 90; // vertical space the title occupies
        const gap = 54; // space between title and body
        const lineHeight = 64;

        // Measure body wrapping first so we can size the canvas to fit.
        const c = document.createElement("canvas");
        let ctx = c.getContext("2d");
        ctx.font = bodyFont;
        const lines = wrapLines(ctx, SIGN_BODY, W - 2 * sideMargin);

        const titleTop = margin;
        const bodyTop = titleTop + titleBlock + gap;
        const bodyBottom = bodyTop + (lines.length - 1) * lineHeight + 52;
        const H = Math.round(bodyBottom + margin);

        // Resizing clears the canvas, so set size, then draw.
        c.width = W;
        c.height = H;
        ctx = c.getContext("2d");

        ctx.fillStyle = "#13132b";
        roundRect(ctx, 0, 0, W, H, 40);
        ctx.fill();
        ctx.strokeStyle = "#FFD45A";
        ctx.lineWidth = 10;
        roundRect(ctx, 18, 18, W - 36, H - 36, 28);
        ctx.stroke();

        ctx.textBaseline = "top";
        // Title: centered
        ctx.textAlign = "center";
        ctx.fillStyle = "#FFD45A";
        ctx.font = titleFont;
        ctx.fillText(SIGN_TITLE, W / 2, titleTop);
        // Body: left-justified, like a paragraph
        ctx.textAlign = "left";
        ctx.fillStyle = "#FFFFFF";
        ctx.font = bodyFont;
        let y = bodyTop;
        for (const ln of lines) {
          ctx.fillText(ln, sideMargin, y);
          y += lineHeight;
        }
        return c;
      }

      function applySignTexture() {
        const plane = document.getElementById("signPlane");
        const mesh = plane && plane.getObject3D("mesh");
        if (!mesh) {
          setTimeout(applySignTexture, 200);
          return;
        }
        const canvas = makeSignCanvas();
        // Match the panel's shape to the image so text isn't stretched.
        plane.setAttribute("height", ((4 * canvas.height) / canvas.width).toFixed(3));
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = 8;
        tex.needsUpdate = true;
        const m = plane.getObject3D("mesh");
        m.material.map = tex;
        if (m.material.color) m.material.color.set("#ffffff");
        m.material.needsUpdate = true;
      }
      applySignTexture();

      // Billboard: rotate an entity around its vertical axis to face the camera.
      AFRAME.registerComponent("face-camera", {
        init: function () {
          this.camWorld = new THREE.Vector3();
          this.objWorld = new THREE.Vector3();
        },
        tick: function () {
          const cam = this.el.sceneEl.camera;
          if (!cam || !cam.el) return;
          cam.el.object3D.getWorldPosition(this.camWorld);
          this.el.object3D.getWorldPosition(this.objWorld);
          const dx = this.camWorld.x - this.objWorld.x;
          const dz = this.camWorld.z - this.objWorld.z;
          this.el.object3D.rotation.set(0, Math.atan2(dx, dz), 0);
        },
      });

      // PREVIEW MODE: add ?preview to the URL to pin the sign 12m to your
      // north (no real GPS needed), so you can check it from anywhere (e.g.
      // home). Real mode (no ?preview) uses the tower's true coordinates.
      const isPreview = new URLSearchParams(location.search).has("preview");
      if (isPreview) {
        const sign = document.getElementById("bellTowerSign");
        sign.removeAttribute("gps-entity-place"); // stop GPS placement
        sign.setAttribute("position", "0 1.6 -12"); // 12m to the north
        document.getElementById("introText").innerHTML =
          "PREVIEW MODE — the sign is pinned 12m to your north.<br /><br />" +
          "Tap Start, allow Camera + Motion, then turn until you face north to find it.";
      }

      // ---- CALIBRATE MODE: position the sign live from your phone ----
      const isCalibrate = new URLSearchParams(location.search).has("calibrate");
      let signLat = TOWER.lat;
      let signLon = TOWER.lon;
      const metersPerLon = (lat) => 111111 * Math.cos((lat * Math.PI) / 180);

      // Move the sign to the current signLat/signLon and refresh it immediately.
      function placeSign() {
        const sign = document.getElementById("bellTowerSign");
        sign.setAttribute(
          "gps-entity-place",
          `latitude: ${signLat}; longitude: ${signLon}`
        );
        // Force AR.js to reposition the sign right now (don't wait for movement).
        window.dispatchEvent(new CustomEvent("gps-camera-origin-coord-set"));
        const out = document.getElementById("coordOut");
        if (out) {
          out.textContent =
            "latitude: " + signLat.toFixed(6) + "; longitude: " + signLon.toFixed(6);
        }
      }

      if (isCalibrate) {
        document.getElementById("introText").innerHTML =
          "CALIBRATE MODE — stand where visitors will stand, facing the tower.<br /><br />" +
          "Tap Start, allow all permissions, then use the controls to place the sign.";

        document.getElementById("dropBtn").addEventListener("click", () => {
          const cam = document.querySelector("[gps-camera]");
          const gps = cam && cam.components && cam.components["gps-camera"];
          if (!gps || !gps.currentCoords) {
            setStatus("No GPS fix yet — wait a few seconds and try again.");
            return;
          }
          const lat = gps.currentCoords.latitude;
          const lon = gps.currentCoords.longitude;
          const h = ((gps.heading == null ? 0 : gps.heading) * Math.PI) / 180;
          signLat = lat + (10 * Math.cos(h)) / 111111; // 10m in the direction you face
          signLon = lon + (10 * Math.sin(h)) / metersPerLon(lat);
          placeSign();
          setStatus("Sign dropped 10m ahead. Nudge N/S/E/W to fine-tune.");
        });

        document.querySelectorAll("#calPanel .nudge button").forEach((b) => {
          b.addEventListener("click", () => {
            const step = 1; // meters per tap
            const dir = b.getAttribute("data-dir");
            if (dir === "N") signLat += step / 111111;
            if (dir === "S") signLat -= step / 111111;
            if (dir === "E") signLon += step / metersPerLon(signLat);
            if (dir === "W") signLon -= step / metersPerLon(signLat);
            placeSign();
          });
        });
      }

      document.getElementById("startBtn").addEventListener("click", async () => {
        // iPhone: tap-to-enable motion/compass.
        try {
          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            await DeviceOrientationEvent.requestPermission();
          }
        } catch (e) {}

        document.getElementById("startOverlay").style.display = "none";
        if (isCalibrate) {
          document.getElementById("calPanel").style.display = "block";
          setStatus("Calibrate: face the tower, then tap 'Drop sign 10m ahead of me'.");
        } else {
          setStatus(
            isPreview
              ? "Preview running — turn slowly to find the Bell Tower sign."
              : "Look toward the Bell Tower — the sign should appear."
          );
        }
      });
    </script>
  </body>
</html>
