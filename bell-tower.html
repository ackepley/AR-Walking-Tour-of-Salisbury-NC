<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bell Tower - Salisbury AR Tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame + AR.js, the versions/config proven to work on your phone. -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
      #startOverlay {
        position: fixed; inset: 0; z-index: 9999;
        background: #111; color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 28px;
      }
      #startBtn {
        margin-top: 26px; padding: 16px 30px; font-size: 18px;
        background: #C8102E; color: #fff; border: none; border-radius: 12px;
      }
      #status {
        position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 9998;
        color: #fff; background: rgba(0,0,0,0.55);
        padding: 10px 14px; border-radius: 10px; font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="startOverlay">
      <h2>Salisbury AR Tour — The Bell Tower</h2>
      <p id="introText">
        Stand near the Bell Tower at Bell Tower Green.<br /><br />
        Tap Start, then allow <b>Camera</b>, <b>Location</b>, and <b>Motion</b>.<br />
        Raise your phone to see the info sign appear.
      </p>
      <button id="startBtn">Start</button>
    </div>

    <div id="status">Waiting to start…</div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
    >
      <!-- GPS + compass camera (no videoTexture; relaxed accuracy). -->
      <a-camera gps-camera="positionMinAccuracy: 1000" rotation-reader></a-camera>

      <!-- The Bell Tower info sign, anchored to the tower's real coordinates.
           position y=1.6 lifts it to about eye level; face-camera makes it
           always turn toward you. -->
      <a-entity
        id="bellTowerSign"
        gps-entity-place="latitude: 35.668573; longitude: -80.473257"
        position="0 1.6 0"
        face-camera
      >
        <a-plane
          width="4.2"
          height="3"
          color="#13132b"
          opacity="0.9"
          material="side: double"
        ></a-plane>
        <a-text
          value="THE BELL TOWER"
          position="0 1.05 0.02"
          align="center"
          width="6"
          color="#FFD45A"
        ></a-text>
        <a-text
          value="Built in 1892 as the bell tower of the First Presbyterian Church, designed by Philadelphia architect Charles W. Bolton in the Romanesque Revival style. The church was razed in 1971, but the tower was saved. Today it anchors Bell Tower Green, a 3.5-acre downtown park that opened in 2021."
          position="0 -0.15 0.02"
          align="center"
          width="3.9"
          color="#FFFFFF"
        ></a-text>
      </a-entity>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (t) => (statusEl.textContent = t);

      const TOWER = { lat: 35.668573, lon: -80.473257 };

      // Billboard: rotate an entity around its vertical axis to face the camera.
      AFRAME.registerComponent("face-camera", {
        init: function () {
          this.camWorld = new THREE.Vector3();
          this.objWorld = new THREE.Vector3();
        },
        tick: function () {
          const cam = this.el.sceneEl.camera;
          if (!cam || !cam.el) return;
          cam.el.object3D.getWorldPosition(this.camWorld);
          this.el.object3D.getWorldPosition(this.objWorld);
          const dx = this.camWorld.x - this.objWorld.x;
          const dz = this.camWorld.z - this.objWorld.z;
          this.el.object3D.rotation.set(0, Math.atan2(dx, dz), 0);
        },
      });

      // PREVIEW MODE: add ?preview to the URL to simulate standing ~12m south
      // of the Bell Tower, so you can see the sign from anywhere (e.g. home).
      const isPreview = new URLSearchParams(location.search).has("preview");
      if (isPreview) {
        const cam = document.querySelector("[gps-camera]");
        const simLat = TOWER.lat - 0.00011; // ~12 meters south
        cam.setAttribute(
          "gps-camera",
          `positionMinAccuracy: 1000; simulateLatitude: ${simLat}; simulateLongitude: ${TOWER.lon}`
        );
        document.getElementById("introText").innerHTML =
          "PREVIEW MODE — simulating a spot ~12m south of the Bell Tower.<br /><br />" +
          "Tap Start, allow Camera + Motion, then turn around to find the sign.";
      }

      document.getElementById("startBtn").addEventListener("click", async () => {
        // iPhone: tap-to-enable motion/compass.
        try {
          if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
          ) {
            await DeviceOrientationEvent.requestPermission();
          }
        } catch (e) {}

        document.getElementById("startOverlay").style.display = "none";
        setStatus(
          isPreview
            ? "Preview running — turn slowly to find the Bell Tower sign."
            : "Look toward the Bell Tower — the sign should appear."
        );
      });
    </script>
  </body>
</html>
